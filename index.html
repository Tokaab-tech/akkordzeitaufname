<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0f766e">
    <title>Akkordzeit</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Akkordarbeit</p>
          <h1>Akkordzeit</h1>
        </div>
        <output id="statusBadge" class="status-badge">Ø 0%</output>
      </header>

      <section class="summary" aria-label="Berechnung">
        <div>
          <span>Gesamtzeit am Tag</span>
          <strong id="totalTime">0 min</strong>
        </div>
        <div>
          <span>Erreichte Prozent am Tag</span>
          <strong id="percentage">0%</strong>
        </div>
      </section>

      <form id="workForm" class="entry-form">
        <label>
          Datum
          <input id="date" name="date" type="date" required>
        </label>

        <button type="button" id="calendarToggle" class="calendar-toggle" aria-expanded="false" aria-controls="calendarPanel">
          Monatsübersicht anzeigen
        </button>

        <section id="calendarPanel" class="calendar-panel is-collapsed" aria-label="Monatsübersicht">
          <div class="calendar-header">
            <button type="button" id="previousMonth" class="calendar-nav" aria-label="Vorheriger Monat">‹</button>
            <strong id="calendarTitle">Monat</strong>
            <button type="button" id="nextMonth" class="calendar-nav" aria-label="Nächster Monat">›</button>
          </div>
          <div class="calendar-weekdays" aria-hidden="true">
            <span>Mo</span>
            <span>Di</span>
            <span>Mi</span>
            <span>Do</span>
            <span>Fr</span>
            <span>Sa</span>
            <span>So</span>
          </div>
          <div id="calendarGrid" class="calendar-grid"></div>
        </section>

        <label>
          Auftragsnr.
          <div class="scan-input">
            <input id="orderNumber" name="orderNumber" type="text" autocomplete="off" placeholder="z. B. 4711-A">
            <button type="button" class="scan-button" data-scan-target="orderNumber" aria-label="Auftragsnr. scannen">Scan</button>
          </div>
        </label>

        <label>
          Identnr.
          <div class="scan-input">
            <input id="identNumber" name="identNumber" type="text" autocomplete="off" placeholder="z. B. A-204">
            <button type="button" class="scan-button" data-scan-target="identNumber" aria-label="Identnr. scannen">Scan</button>
          </div>
        </label>

        <div class="field-row">
          <label>
            Stückzahl
            <input id="quantity" name="quantity" type="number" min="0" step="1" inputmode="numeric" placeholder="0">
          </label>

          <label>
            Zeit pro Teil
            <div class="unit-input">
              <input id="timePerPart" name="timePerPart" type="number" min="0" step="0.01" inputmode="decimal" placeholder="0">
              <span>min</span>
            </div>
          </label>
        </div>

        <div class="field-row">
          <label>
            Rüstzeit
            <div class="unit-input">
              <input id="setupTime" name="setupTime" type="number" min="0" step="0.01" inputmode="decimal" placeholder="0">
              <span>min</span>
            </div>
          </label>

          <label>
            Arbeitszeit
            <div class="unit-input">
              <input id="availableTime" name="availableTime" type="number" min="0" step="1" inputmode="numeric" value="420">
              <span>min</span>
            </div>
          </label>
        </div>

        <label>
          D-Stunden (Ausfallzeit Produktion)
          <div class="unit-input">
            <input id="downtime" name="downtime" type="number" min="0" step="0.01" inputmode="decimal" placeholder="0">
            <span>min</span>
          </div>
        </label>

        <label>
          Anmerkungen
          <textarea id="notes" name="notes" rows="3" placeholder="z. B. Störung, Nacharbeit, Material fehlt"></textarea>
        </label>

        <button type="button" id="saveEntry" class="primary-action">Eintrag speichern</button>
      </form>

      <section class="history-section" aria-label="Gespeicherte Einträge">
        <div class="section-heading">
          <h2>Einträge</h2>
          <button type="button" id="clearEntries" class="text-action">Leeren</button>
        </div>
        <ol id="entryList" class="entry-list"></ol>
      </section>

      <a id="monthlyOverviewLink" class="monthly-overview-link" href="monthly.html">Monatsauswertung</a>

      <section class="tools-section" aria-label="Daten und Export">
        <div class="section-heading">
          <h2>Daten</h2>
        </div>
        <div class="action-grid">
          <button type="button" id="exportBackup" class="secondary-action">Backup exportieren</button>
          <button type="button" id="importBackup" class="secondary-action">Backup importieren</button>
          <button type="button" id="exportMonthPdf" class="secondary-action">Monat als PDF</button>
        </div>
        <input id="backupFile" class="file-import" type="file" accept="application/json,.json">
      </section>

    </main>

    <section id="printReport" class="print-report" aria-label="Monatsbericht"></section>

    <dialog id="scannerDialog" class="scanner-dialog">
      <div class="scanner-box">
        <div class="scanner-heading">
          <h2 id="scannerTitle">Barcode scannen</h2>
          <button type="button" id="closeScanner" class="scanner-close" aria-label="Scanner schließen">×</button>
        </div>
        <div class="scanner-view">
          <video id="scannerVideo" autoplay muted playsinline></video>
          <div class="scanner-frame"></div>
        </div>
        <p id="scannerStatus" class="scanner-status">Kamera wird gestartet...</p>
        <div id="scannerResult" class="scanner-result is-hidden">
          <label>
            Erkanntes Ergebnis
            <input id="scannerResultValue" type="text" readonly>
          </label>
          <div class="scanner-actions">
            <button type="button" id="rescanBarcode" class="secondary-action">Erneut scannen</button>
            <button type="button" id="confirmBarcode" class="primary-action">Übernehmen</button>
          </div>
        </div>
      </div>
    </dialog>

    <dialog id="noteEditorDialog" class="editor-dialog">
      <div class="editor-box">
        <div class="scanner-heading">
          <h2>Anmerkung bearbeiten</h2>
          <button type="button" id="closeNoteEditor" class="scanner-close" aria-label="Bearbeiten schließen">×</button>
        </div>
        <label>
          Anmerkung
          <textarea id="noteEditorValue" rows="5" placeholder="Anmerkung eingeben"></textarea>
        </label>
        <div class="editor-actions">
          <button type="button" id="cancelNoteEdit" class="secondary-action">Abbrechen</button>
          <button type="button" id="saveNoteEdit" class="primary-action">Speichern</button>
        </div>
      </div>
    </dialog>

    <script src="vendor/zxing-browser.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
